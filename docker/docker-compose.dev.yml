version: '3.8'

services:
  # App Redis (for BullMQ)
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # Judge0 dependencies
  judge0-db:
    image: postgres:13
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0secret
    volumes:
      - judge0-db-data:/var/lib/postgresql/data

  judge0-redis:
    image: redis:6.0

  # Judge0 CE server
  judge0-server:
    image: judge0/judge0:1.13.1
    ports:
      - '2358:2358'
    depends_on:
      - judge0-db
      - judge0-redis
    env_file:
      - ./judge0.conf
    privileged: true
    restart: on-failure

  # Judge0 CE workers
  judge0-workers:
    image: judge0/judge0:1.13.1
    command: ['./scripts/workers']
    depends_on:
      - judge0-db
      - judge0-redis
    env_file:
      - ./judge0.conf
    privileged: true
    restart: on-failure

  # Our API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - '4000:4000'
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JUDGE0_URL=http://judge0-server:2358
      - WEB_URL=http://localhost:3000
      - NODE_ENV=development
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  # Our Worker
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - JUDGE0_URL=http://judge0-server:2358
      - NODE_ENV=development
    depends_on:
      redis:
        condition: service_healthy
      judge0-server:
        condition: service_started
    restart: on-failure

  # Our Web (Next.js)
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - '6000:3000'
    environment:
      - API_URL=http://api:4000
      - NEXT_PUBLIC_WS_URL=http://localhost:4000
    depends_on:
      - api
    restart: on-failure

volumes:
  judge0-db-data:

